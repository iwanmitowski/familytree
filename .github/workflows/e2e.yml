name: E2E

# Nightly + manual only — not PR-blocking (idea.md §23).
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare E2E env
        run: cp apps/web/.env.e2e.example apps/web/.env.e2e

      - name: Bring up the backend stack
        run: bash scripts/e2e-up.sh

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run E2E tests
        run: npm run e2e
        working-directory: apps/web

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
