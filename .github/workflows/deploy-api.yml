name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'packages/shared/**'
      - 'infra/oracle/**'
      - 'scripts/deploy.sh'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Existing image tag (commit SHA) to (re)deploy — used for rollback'
        required: false

concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  test:
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: familytree
          POSTGRES_PASSWORD: familytree
          POSTGRES_DB: familytree_dev
        ports: ['5433:5432']
        options: >-
          --health-cmd "pg_isready -U familytree -d familytree_dev"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://familytree:familytree@localhost:5433/familytree_dev
      SERVICE_ID: ci
      SERVICE_HMAC_SECRET: ci-hmac-secret-0123456789abcdef
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: psql "$DATABASE_URL" -c 'CREATE DATABASE familytree_test'
      - run: npm run typecheck --workspace @familytree/api
      - run: npm test --workspace @familytree/api
      - run: npm run migrate:up --workspace @familytree/api
      - run: npm run test:integration --workspace @familytree/api

  build-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: echo "tag=${{ inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Never 'latest' as the only tag — tag with the commit SHA (idea.md §20).
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/familytree-api:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/familytree-api:main

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Copy deploy assets to the VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: 'scripts/deploy.sh,infra/oracle/docker-compose.prod.yml,infra/oracle/Caddyfile'
          target: /opt/familytree
          strip_components: 0
      - name: Deploy + health gate
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cp /opt/familytree/infra/oracle/docker-compose.prod.yml /opt/familytree/docker-compose.prod.yml
            cp /opt/familytree/infra/oracle/Caddyfile /opt/familytree/Caddyfile
            chmod +x /opt/familytree/scripts/deploy.sh
            IMAGE_TAG='${{ needs.build-push.outputs.image_tag }}' \
              API_DOMAIN='${{ vars.API_DOMAIN }}' \
              /opt/familytree/scripts/deploy.sh
